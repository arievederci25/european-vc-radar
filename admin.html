<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' fonts.googleapis.com 'unsafe-inline'; font-src fonts.gstatic.com; connect-src https://swhjffkhhwktrvwiqmoe.supabase.co; img-src 'self'; object-src 'none'; base-uri 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Permissions-Policy" content="geolocation=(), camera=(), microphone=()">
<title>VC Radar &mdash; Admin</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
:root{
  --cream:#faf8f4;--cream-2:#f2ede6;--coral:#e87461;--dark:#1a1805;
  --mid:#6b6658;--light:#a09888;--white:#ffffff;
  --border:rgba(26,24,5,0.09);--shadow-sm:0 2px 8px rgba(26,24,5,0.06);
  --font:'Plus Jakarta Sans',system-ui,sans-serif;--mono:'JetBrains Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--cream);color:var(--dark);min-height:100vh}

/* LOGIN */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:var(--white);border:1px solid var(--border);border-radius:20px;
  padding:40px;width:340px;box-shadow:var(--shadow-sm);text-align:center}
.login-logo{width:40px;height:40px;background:var(--coral);border-radius:10px;
  display:inline-flex;align-items:center;justify-content:center;margin-bottom:20px}
.login-logo svg{width:22px;height:22px;fill:white}
.login-box h1{font-size:20px;font-weight:800;margin-bottom:6px}
.login-box p{font-size:13px;color:var(--mid);margin-bottom:24px}
.login-box input{width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:10px;font-family:var(--font);font-size:14px;outline:none;
  background:var(--cream);margin-bottom:12px;transition:border-color .2s}
.login-box input:focus{border-color:var(--coral)}
.login-btn{width:100%;padding:12px;background:var(--dark);color:white;border:none;
  border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;
  cursor:pointer;transition:background .2s}
.login-btn:hover{background:var(--coral)}
.login-err{color:#c94e3a;font-size:12px;margin-top:8px}

/* DASHBOARD */
.dash{display:none;padding:40px 24px;max-width:1100px;margin:0 auto}
.dash-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:40px}
.dash-brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:18px}
.dash-logo{width:36px;height:36px;background:var(--coral);border-radius:9px;
  display:flex;align-items:center;justify-content:center}
.dash-logo svg{width:20px;height:20px;fill:white}
.logout-btn{padding:8px 18px;border:1.5px solid var(--border);border-radius:999px;
  font-size:12px;font-weight:600;color:var(--mid);background:none;cursor:pointer;
  font-family:var(--font);transition:all .2s}
.logout-btn:hover{background:var(--dark);color:white;border-color:var(--dark)}

.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:32px}
.kpi{background:var(--white);border:1px solid var(--border);border-radius:16px;
  padding:24px;box-shadow:var(--shadow-sm)}
.kpi-val{font-size:32px;font-weight:800;font-family:var(--mono);letter-spacing:-0.03em;color:var(--dark);line-height:1}
.kpi-val em{color:var(--coral);font-style:normal}
.kpi-label{font-size:11px;font-weight:600;color:var(--light);text-transform:uppercase;letter-spacing:.1em;margin-top:6px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.card{background:var(--white);border:1px solid var(--border);border-radius:16px;
  padding:24px;box-shadow:var(--shadow-sm)}
.card-title{font-size:11px;font-weight:700;color:var(--light);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:20px}

table{width:100%;border-collapse:collapse}
th{font-size:10px;font-weight:700;color:var(--light);text-transform:uppercase;
  letter-spacing:.1em;padding:0 0 10px;text-align:left;border-bottom:1px solid var(--border)}
td{font-size:13px;font-weight:500;color:var(--dark);padding:10px 0;
  border-bottom:1px solid var(--border)}
td:last-child,th:last-child{text-align:right}
tr:last-child td{border-bottom:none}
.bar-cell{display:flex;align-items:center;gap:10px}
.mini-bar{height:6px;border-radius:3px;background:var(--coral);min-width:4px;transition:width .4s}

.spark-row{display:flex;align-items:flex-end;gap:4px;height:60px;margin-top:4px}
.spark-col{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
.spark-bar{width:100%;border-radius:3px 3px 0 0;background:var(--coral);opacity:.8}
.spark-lbl{font-size:9px;font-family:var(--mono);color:var(--light);white-space:nowrap}

.loading{color:var(--light);font-size:13px;text-align:center;padding:40px}
.period-tabs{display:flex;gap:6px;margin-bottom:20px}
.ptab{padding:5px 12px;border-radius:999px;font-size:11px;font-weight:600;
  border:1.5px solid var(--border);background:none;color:var(--mid);cursor:pointer;font-family:var(--font);transition:all .18s}
.ptab.active{background:var(--dark);color:white;border-color:var(--dark)}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 51 49"><path d="m30.388 34.796-9.8-9.8-9.8 9.8L1 25v19.592l9.8-9.8 9.8 9.8Z"/><path d="m49.981 15.204-9.8-9.8-9.8 9.8-9.8-9.8V25l9.8-9.8 9.8 9.8Z"/></svg>
    </div>
    <h1>VC Radar Admin</h1>
    <p>Enter your password to view analytics</p>
    <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">Sign in</button>
    <div class="login-err" id="loginErr"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="dash-header">
    <div class="dash-brand">
      <div class="dash-logo">
        <svg viewBox="0 0 51 49"><path d="m30.388 34.796-9.8-9.8-9.8 9.8L1 25v19.592l9.8-9.8 9.8 9.8Z"/><path d="m49.981 15.204-9.8-9.8-9.8 9.8-9.8-9.8V25l9.8-9.8 9.8 9.8Z"/></svg>
      </div>
      VC Radar Analytics
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>

  <div class="period-tabs">
    <button class="ptab active" onclick="setPeriod(7,this)">7 days</button>
    <button class="ptab" onclick="setPeriod(30,this)">30 days</button>
    <button class="ptab" onclick="setPeriod(90,this)">90 days</button>
    <button class="ptab" onclick="setPeriod(0,this)">All time</button>
  </div>

  <div class="kpi-row">
    <div class="kpi"><div class="kpi-val" id="kTotalViews">&mdash;</div><div class="kpi-label">Total page views</div></div>
    <div class="kpi"><div class="kpi-val" id="kToday">&mdash;</div><div class="kpi-label">Views today</div></div>
    <div class="kpi"><div class="kpi-val" id="kAvgDay">&mdash;</div><div class="kpi-label">Avg per day</div></div>
    <div class="kpi"><div class="kpi-val" id="kContactViews">&mdash;</div><div class="kpi-label">Contact page views</div></div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Views over time</div>
      <div class="spark-row" id="sparkChart"><div class="loading">Loading&hellip;</div></div>
    </div>
    <div class="card">
      <div class="card-title">Top referrers</div>
      <table id="refTable"><tr><td class="loading">Loading&hellip;</td></tr></table>
    </div>
  </div>

  <div class="grid2">
    <div class="card">
      <div class="card-title">Pages</div>
      <table id="pageTable"><tr><td class="loading">Loading&hellip;</td></tr></table>
    </div>
    <div class="card">
      <div class="card-title">Recent views</div>
      <table id="recentTable"><tr><td class="loading">Loading&hellip;</td></tr></table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://swhjffkhhwktrvwiqmoe.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3aGpmZmtoaHdrdHJ2d2lxbW9lIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyMTY5NDYsImV4cCI6MjA5MDc5Mjk0Nn0.XjNLCy3Fahc9AlitTpLWMQFRFC8HXh3OVT5iaIeFrNE';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_PASSWORD = 'vcradar2026';
function esc(s){if(s==null)return'';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
let currentDays = 7;

function login() {
  const pw = document.getElementById('pwInput').value;
  if (pw === ADMIN_PASSWORD) {
    sessionStorage.setItem('vc_admin', '1');
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    loadAll();
  } else {
    document.getElementById('loginErr').textContent = 'Incorrect password';
  }
}

function logout() {
  sessionStorage.removeItem('vc_admin');
  location.reload();
}

function setPeriod(days, btn) {
  currentDays = days;
  document.querySelectorAll('.ptab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  loadAll();
}

function sinceDate(days) {
  if (!days) return null;
  const d = new Date();
  d.setDate(d.getDate() - days);
  return d.toISOString();
}

function fmt(n) {
  return n >= 1000 ? (n/1000).toFixed(1)+'k' : n;
}

async function loadAll() {
  const since = sinceDate(currentDays);
  let q = db.from('page_views').select('*', {count:'exact'});
  if (since) q = q.gte('created_at', since);
  const { data, count } = await q.order('created_at', {ascending:false});
  if (!data) return;

  renderKPIs(data, count);
  renderSpark(data);
  renderPages(data);
  renderReferrers(data);
  renderRecent(data);
}

function renderKPIs(data, count) {
  document.getElementById('kTotalViews').textContent = fmt(count);

  const todayStr = new Date().toISOString().slice(0,10);
  const todayCount = data.filter(r => r.created_at.startsWith(todayStr)).length;
  document.getElementById('kToday').textContent = todayCount;

  const days = currentDays || Math.max(1, Math.ceil((Date.now() - new Date(data[data.length-1]?.created_at)) / 86400000));
  document.getElementById('kAvgDay').textContent = Math.round(count / Math.max(1, currentDays || days));

  const contactCount = data.filter(r => r.page && r.page.includes('contact')).length;
  document.getElementById('kContactViews').textContent = contactCount;
}

function renderSpark(data) {
  const el = document.getElementById('sparkChart');
  if (!data.length) { el.innerHTML = '<span style="color:var(--light);font-size:13px">No data yet</span>'; return; }

  const days = Math.min(currentDays || 30, 30);
  const buckets = {};
  for (let i = days - 1; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    buckets[d.toISOString().slice(0,10)] = 0;
  }
  data.forEach(r => {
    const k = r.created_at.slice(0,10);
    if (k in buckets) buckets[k]++;
  });

  const keys = Object.keys(buckets);
  const vals = Object.values(buckets);
  const maxV = Math.max(...vals, 1);

  el.innerHTML = keys.map((k,i) => {
    const h = Math.max(4, Math.round((vals[i]/maxV)*56));
    const lbl = i === 0 || i === keys.length-1 || i % Math.ceil(keys.length/6) === 0
      ? k.slice(5) : '';
    return `<div class="spark-col">
      <div class="spark-bar" style="height:${h}px" title="${k}: ${vals[i]} views"></div>
      <span class="spark-lbl">${lbl}</span>
    </div>`;
  }).join('');
}

function cleanPage(p) {
  if (!p) return '/';
  // Reject data: URLs, excessively long strings, or URL-encoded HTML blobs
  if (p.length > 120 || p.startsWith('data:') || p.includes('%3C') || p.includes('%0A')) return null;
  return p;
}

function renderPages(data) {
  const counts = {};
  data.forEach(r => {
    const p = cleanPage(r.page);
    if (!p) return;
    counts[p] = (counts[p]||0)+1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
  const max = sorted[0]?.[1] || 1;
  const el = document.getElementById('pageTable');
  if (!sorted.length) { el.innerHTML = '<tr><td class="loading">No data yet</td></tr>'; return; }
  el.innerHTML = `<tr><th>Page</th><th>Views</th></tr>` +
    sorted.map(([p,n]) => `<tr>
      <td><div class="bar-cell"><div class="mini-bar" style="width:${Math.round((n/max)*80)+20}px"></div>${esc(p)}</div></td>
      <td>${n}</td>
    </tr>`).join('');
}

function renderReferrers(data) {
  const counts = {};
  data.forEach(r => {
    let ref = r.referrer;
    if (!ref) ref = 'Direct';
    else { try { ref = new URL(ref).hostname.replace('www.',''); } catch(e){} }
    counts[ref] = (counts[ref]||0)+1;
  });
  const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const max = sorted[0]?.[1] || 1;
  const el = document.getElementById('refTable');
  if (!sorted.length) { el.innerHTML = '<tr><td class="loading">No data yet</td></tr>'; return; }
  el.innerHTML = `<tr><th>Source</th><th>Views</th></tr>` +
    sorted.map(([r,n]) => `<tr>
      <td><div class="bar-cell"><div class="mini-bar" style="width:${Math.round((n/max)*80)+20}px"></div>${esc(r)}</div></td>
      <td>${n}</td>
    </tr>`).join('');
}

function renderRecent(data) {
  const el = document.getElementById('recentTable');
  const recent = data.slice(0,15);
  if (!recent.length) { el.innerHTML = '<tr><td class="loading">No data yet</td></tr>'; return; }
  el.innerHTML = `<tr><th>Time</th><th>Page</th></tr>` +
    recent.map(r => {
      const d = new Date(r.created_at);
      const t = d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}) + ' ' +
                d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      return `<tr><td style="font-family:var(--mono);font-size:12px">${esc(t)}</td><td>${esc(cleanPage(r.page)||'/')}</td></tr>`;
    }).join('');
}

// Auto-login if session exists
if (sessionStorage.getItem('vc_admin') === '1') {
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dash').style.display = 'block';
  loadAll();
}
</script>
</body>
</html>
