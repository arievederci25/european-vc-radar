<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:transparent;display:inline-flex}
.logo{
  display:inline-flex;align-items:center;gap:14px;
  padding:12px 20px 12px 12px;
  font-family:'Plus Jakarta Sans',sans-serif;
}
.logo-box{
  width:52px;height:52px;
  background:#e87461;
  border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.logo-box svg{width:30px;height:30px;fill:white}
.name{
  font-size:26px;font-weight:800;
  color:#1a1805;
  letter-spacing:-0.02em;
}
</style>
</head>
<body>
<div class="logo">
  <div class="logo-box">
    <svg viewBox="0 0 51 49"><path d="m30.388 34.796-9.8-9.8-9.8 9.8L1 25v19.592l9.8-9.8 9.8 9.8Z"/><path d="m49.981 15.204-9.8-9.8-9.8 9.8-9.8-9.8V25l9.8-9.8 9.8 9.8Z"/></svg>
  </div>
  <span class="name">VC Radar</span>
</div>
</body>
</html>
